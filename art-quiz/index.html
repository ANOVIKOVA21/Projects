<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/owfont-regular.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="main.js" />
    <title>Art Quiz</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <img src="assets/svg/logo1.webp" alt="logo">
        </div>
    </header>
    <main>
        <div class="home-page">
            <div class="choice">
                <div class="painter game-type">
                    <h3 class="game-type-text">ARTISTS QUIZ</h2>
                </div>
                <div class="picture game-type">
                    <h3 class="game-type-text">PICTURES QUIZ</h2>
                </div>
            </div>
            <div class="settings"></div>
        </div>
        <div class="settings-page">
            <div class="wrap">
                <span class="back">Back</span>
                <h2 class="title">Settings</h2>
                <!-- <label for="volume">Volume</label> -->
                <p>Volume</p>
                <input type="range" value="50" min="0" max="100" class="volume" id="volume">
                <p>Time game</p>
                <div class="switcher">
                    <span class="swith-text">On</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                <p>Time to answer</p>
                <div>
                    <button type="button" onclick="less(ticketBasic)" class="less">–</button>
                    <input type="number" min="5" max="30" value="20" step="5" class="time">
                    <button type="button" onclick="more(ticketBasic)" class="more">+</button>
                </div>
            </div>
        </div>
        <div class="categories-page">
            <div class="wrap">
                <header class="categories-header">
                    <div class="categories-logo">
                        <img src="assets/svg/logo1.webp" alt="logo">
                    </div>
                    <p>Home</p>
                    <div class="settings"></div>
                </header>
                <h2 class="title">Categories</h2>
                <div class="categories">
                    <div class="category">
                        <div class="category-title">
                            <h3 class="category-num">1</h3>
                            <p class="result"><span class="true-answers">0</span>/10</p>
                        </div>
                        <div class="category-img"></div>
                    </div>
                    <div class="category">
                        <div class="category-title">
                            <h3 class="category-num">2</h3>
                            <p class="result"><span class="true-answers">0</span>/10</p>
